<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Game 🦄</title>
    <link rel="stylesheet" href="./assets/css/global.css">
</head>

<body>
    <main>
        <div class="container">
            <!-- HEADER --------------------------------------------- -->
            <div class="header">
                <h1>THE GREAT</h1>
                <p class="large-fs"></p>
                <h1>COLOR GAME </h1>
            </div>
            <!-- WHITE AREA ----------------------------------------- -->
            <div class="white-bg">
                <div class="white-flex">
                    <div class="active-btn">NEW COLORS</div>
                    <div class="comment"></div>
                    <div class="toggle">
                        <div class="easy level-btn active-btn active-class">EASY</div>
                        <div class="hard level-btn active-btn">HARD</div>
                    </div>
                </div>
            </div>
            <!-- MAIN SQUARE CONTENT -->
            <div class="center-content">
                <!-- content 1 -->
                <div class="main-content cards">
                </div>
                <!-- content 2  HARD TAB -->
                <div class="main-content-2 cards content-display"></div>
            </div>
        </div>
    </main>



    <!-- pic for load  -->
    <div class="loading-img">
        <img src="./assets/pic/waitt.gif" alt="">
    </div>


    <script src="./assets/js/script.js"></script>

</body>

</html>
